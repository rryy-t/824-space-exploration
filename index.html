<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 [수행평가 완결형] 우주 탐사 시뮬레이터</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #161b26;
      --text-color: #f3f4f6;
      --accent-color: #3b82f6;
      --accent-success: #10b981;
      --border-color: #374151;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 800px;
      width: 100%;
      background: var(--card-bg);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      border: 1px solid var(--border-color);
    }
    h1 {
      text-align: center;
      color: #ffffff;
      font-size: 1.8rem;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }
    h2 {
      font-size: 1.2rem;
      border-left: 4px solid var(--accent-color);
      padding-left: 10px;
      margin-top: 25px;
      margin-bottom: 15px;
    }
    .input-group {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 15px;
      margin-bottom: 12px;
      align-items: center;
    }
    label {
      font-size: 0.95rem;
      color: #cbd5e1;
    }
    input[type="number"], input[type="text"] {
      background: #1f2937;
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.95rem;
      width: 100%;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: var(--accent-color);
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent-color);
      border: none;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #2563eb;
    }
    .btn-add {
      background: #4b5563;
      padding: 6px 12px;
      font-size: 0.85rem;
      margin-top: 5px;
      width: auto;
    }
    .btn-add:hover {
      background: #374151;
    }
    .result-box {
      margin-top: 30px;
      padding: 20px;
      background: #1f2937;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      display: none;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      text-align: center;
      margin-bottom: 20px;
    }
    .summary-card {
      background: #111827;
      padding: 15px;
      border-radius: 6px;
      border: 1px solid #374151;
    }
    .summary-card .value {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--accent-success);
      margin-top: 5px;
    }
    .summary-card .value.used {
      color: #f59e0b;
    }
